<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SopranoChat Logo Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070B14; color: #e5e7eb; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
h1 { font-size: 12px; color: #4b5563; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
.section { margin-bottom: 50px; text-align: center; }
.section h2 { font-size: 11px; color: #6b7280; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
.row { display: flex; align-items: center; gap: 40px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 30px 40px; display: flex; align-items: center; justify-content: center; }
.card:hover { border-color: rgba(59,130,246,0.2); }
.label { font-size: 9px; color: #374151; letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; text-align: center; }

/* ═══ THE LOGO ═══ */
.sc-logo { display: inline-flex; align-items: center; user-select: none; cursor: default; transition: filter 0.3s; }
.sc-logo:hover { filter: drop-shadow(0 0 20px rgba(59,130,246,0.15)); }
.sc-wordmark { display: inline-flex; align-items: baseline; }
.sc-soprano {
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(135deg, #93c5fd 0%, #3b82f6 40%, #1d4ed8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.sc-chat {
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1;
    color: rgba(148, 163, 184, 0.8);
}

/* Size variants */
.sc-sm .sc-soprano { font-size: 16px; }
.sc-sm .sc-chat { font-size: 14px; }
.sc-sm { gap: 6px; }

.sc-md .sc-soprano { font-size: 22px; }
.sc-md .sc-chat { font-size: 18px; }
.sc-md { gap: 8px; }

.sc-lg .sc-soprano { font-size: 32px; }
.sc-lg .sc-chat { font-size: 26px; }
.sc-lg { gap: 10px; }

.sc-xl .sc-soprano { font-size: 44px; }
.sc-xl .sc-chat { font-size: 36px; }
.sc-xl { gap: 14px; }

/* Contexts */
.context-sidebar { background: rgba(15,22,38,0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 16px 20px; }
.context-header { background: linear-gradient(180deg, rgba(15,22,38,0.8) 0%, rgba(7,11,20,0.95) 100%); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 14px 24px; width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; }
.context-mobile { background: #070B14; border: 2px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 20px 28px; width: 280px; }
.context-mobile-status { display: flex; justify-content: space-between; font-size: 10px; color: #4b5563; margin-bottom: 12px; }
</style>
</head>
