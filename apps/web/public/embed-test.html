<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soprano Embed Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: sans-serif;
            color: #fff;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: #e94560;
        }

        .frame-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            border: 2px solid #e94560;
            border-radius: 12px;
            overflow: hidden;
        }

        iframe {
            display: block;
            width: 100%;
            height: 1000px;
            border: none;
        }
    </style>
</head>

<body>
    <h1>🎤 Soprano Chat — Embed Test</h1>
    <div class="frame-wrapper">
        <iframe src="http://localhost:3000/embed/deneme" width="100%" height="1000" frameborder="0"
            allow="camera; microphone; fullscreen; display-capture" style="border:none;border-radius:12px;">
        </iframe>
    </div>
</body>

</html>
